version: "3.9"

services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3050:3000"
      - "5173:5173"
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    command: npm run dev
    environment:
      - MODE=api
    volumes:
      - ./gateway:/app
      - /app/node_modules
    ports:
      - "3051:3001"
    depends_on:
      - backend
      - redis

  worker:
    build: ./gateway
    command: npm run dev
    environment:
      - MODE=worker
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      - backend
      - redis

  scheduler:
    build: ./gateway
    command: npm run dev
    environment:
      - MODE=scheduler
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      - backend
      - redis

  redis:
    image: redis:7
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6479:6379"

  backend:
    build: ./backend
    user: "${USER_ID}:${GROUP_ID}"
    volumes:
      - ./backend:/app
    ports:
      - "3053:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_development
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  redis_data:




