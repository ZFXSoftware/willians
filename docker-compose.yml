version: "3.9"

services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  gateway:
    build: ./gateway
    volumes:
      - ./gateway:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend

  backend:
    build: ./backend
    user: "${USER_ID}:${GROUP_ID}"
    volumes:
      - ./backend:/app
    ports:
      - "3003:3000"
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_development
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
